name: "Phase 2 冒烟测试"
description: "apikey / model / conversation / chat 基础流程"
steps:
  - name: "健康检查"
    method: GET
    path: /api/v1/health
    expect:
      status: 200

  - name: "创建 API Key"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "openai"
      key: "{{env.TEST_API_KEY}}"
      displayName: "smoke-test"
    expect:
      status: 201
    capture:
      keyId: "$.data.id"

  - name: "列出 API Keys"
    method: GET
    path: /api/v1/api-keys
    expect:
      status: 200

  - name: "设置 Chat 模型"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "openai"
      modelId: "gpt-4o-mini"
    expect:
      status: 200

  - name: "查询模型配置"
    method: GET
    path: /api/v1/model-configs
    expect:
      status: 200

  - name: "创建对话"
    method: POST
    path: /api/v1/conversations
    body:
      title: "smoke-test conv"
    expect:
      status: 201
    capture:
      convId: "$.data.id"

  - name: "列出对话"
    method: GET
    path: /api/v1/conversations
    expect:
      status: 200

  - name: "发送消息"
    method: POST
    path: /api/v1/conversations/{{convId}}/messages
    body:
      content: "Hello, reply with just: OK"
    expect:
      status: 202

  - name: "列出消息"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages
    expect:
      status: 200

  - name: "删除对话"
    method: DELETE
    path: /api/v1/conversations/{{convId}}
    expect:
      status: 204

  - name: "删除 API Key"
    method: DELETE
    path: /api/v1/api-keys/{{keyId}}
    expect:
      status: 204
