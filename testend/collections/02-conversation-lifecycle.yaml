name: "02 Conversation 完整生命周期"
description: "CRUD / 改名 / system_prompt / 软删除 / 访问已删除对话"
steps:
  - name: "创建对话（有标题）"
    method: POST
    path: /api/v1/conversations
    body:
      title: "lifecycle-conv-1"
    expect:
      status: 201
    capture:
      convId1: "$.data.id"

  - name: "创建对话（空标题，合法）"
    method: POST
    path: /api/v1/conversations
    body:
      title: ""
    expect:
      status: 201
    capture:
      convId2: "$.data.id"

  - name: "创建对话（含 system prompt）"
    method: POST
    path: /api/v1/conversations
    body:
      title: "conv-with-system-prompt"
      systemPrompt: "Always reply in exactly 3 words."
    expect:
      status: 201
    capture:
      convId3: "$.data.id"

  - name: "创建对话（超长标题）"
    method: POST
    path: /api/v1/conversations
    body:
      title: "This is a very long conversation title that contains many words and characters to test edge cases in the title handling"
    expect:
      status: 201
    capture:
      convId4: "$.data.id"

  - name: "列出对话（默认分页）"
    method: GET
    path: /api/v1/conversations
    expect:
      status: 200

  - name: "列出对话 limit=2"
    method: GET
    path: /api/v1/conversations?limit=2
    expect:
      status: 200

  - name: "列出对话 limit=1"
    method: GET
    path: /api/v1/conversations?limit=1
    expect:
      status: 200

  - name: "改名对话 1（有意义的名字）"
    method: PATCH
    path: /api/v1/conversations/{{convId1}}
    body:
      title: "renamed-lifecycle-conv-1"
    expect:
      status: 200

  - name: "改名对话 2（从空 → 有名）"
    method: PATCH
    path: /api/v1/conversations/{{convId2}}
    body:
      title: "was-empty-now-has-name"
    expect:
      status: 200

  - name: "改名对话 2（变回空）"
    method: PATCH
    path: /api/v1/conversations/{{convId2}}
    body:
      title: ""
    expect:
      status: 200

  - name: "改名对话 3（emoji 标题）"
    method: PATCH
    path: /api/v1/conversations/{{convId3}}
    body:
      title: "🤖 AI 助手对话"
    expect:
      status: 200

  - name: "删除对话 4"
    method: DELETE
    path: /api/v1/conversations/{{convId4}}
    expect:
      status: 204

  - name: "改名已删除对话（404）"
    method: PATCH
    path: /api/v1/conversations/{{convId4}}
    body:
      title: "should-fail"
    expect:
      status: 404

  - name: "再次删除已删除对话（404）"
    method: DELETE
    path: /api/v1/conversations/{{convId4}}
    expect:
      status: 404

  - name: "不存在的对话 ID（404）"
    method: PATCH
    path: /api/v1/conversations/cv_totally_fake_id_000
    body:
      title: "ghost"
    expect:
      status: 404

  - name: "列出消息（空对话）"
    method: GET
    path: /api/v1/conversations/{{convId1}}/messages
    expect:
      status: 200

  - name: "列出消息（已删除对话）"
    method: GET
    path: /api/v1/conversations/{{convId4}}/messages
    expect:
      status: 404

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "删除对话 1"
    method: DELETE
    path: /api/v1/conversations/{{convId1}}
    expect:
      status: 204

  - name: "删除对话 2"
    method: DELETE
    path: /api/v1/conversations/{{convId2}}
    expect:
      status: 204

  - name: "删除对话 3"
    method: DELETE
    path: /api/v1/conversations/{{convId3}}
    expect:
      status: 204
