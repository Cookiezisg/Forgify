name: "04 Tool CRUD + 版本管理"
description: "创建 → 读取 → 更新名/描述/代码 → 版本历史 → 回滚 → 执行 → 删除"
steps:
  - name: "创建工具 v1（加法函数）"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_add_v1"
      description: "Add two integers"
      code: "def test_add_v1(a: int, b: int) -> int:\n    \"\"\"Add two integers.\n\n    Args:\n        a: First integer\n        b: Second integer\n\n    Returns:\n        Sum of a and b\n    \"\"\"\n    return a + b\n"
      tags: ["math", "crud-test"]
    expect:
      status: 201
    capture:
      toolId: "$.data.id"

  - name: "获取工具详情"
    method: GET
    path: /api/v1/tools/{{toolId}}
    expect:
      status: 200

  - name: "列出工具（含新创建的）"
    method: GET
    path: /api/v1/tools
    expect:
      status: 200

  - name: "只更新描述（PATCH 单字段）"
    method: PATCH
    path: /api/v1/tools/{{toolId}}
    body:
      description: "Updated description only"
    expect:
      status: 200

  - name: "只更新 tags"
    method: PATCH
    path: /api/v1/tools/{{toolId}}
    body:
      tags: ["math", "crud-test", "v1"]
    expect:
      status: 200

  - name: "执行工具（1+2=3）"
    method: POST
    path: /api/v1/tools/{{toolId}}:run
    body:
      input:
        a: 1
        b: 2
    expect:
      status: 200

  - name: "执行工具（负数：-5+3=-2）"
    method: POST
    path: /api/v1/tools/{{toolId}}:run
    body:
      input:
        a: -5
        b: 3
    expect:
      status: 200

  - name: "执行工具（超大数）"
    method: POST
    path: /api/v1/tools/{{toolId}}:run
    body:
      input:
        a: 999999999
        b: 1000000000
    expect:
      status: 200

  - name: "查看运行历史（3 条）"
    method: GET
    path: /api/v1/tools/{{toolId}}/run-history
    expect:
      status: 200

  - name: "版本列表（v1 初始应有 1 条）"
    method: GET
    path: /api/v1/tools/{{toolId}}/versions
    expect:
      status: 200

  - name: "更新代码 → 触发保存 v2"
    method: PATCH
    path: /api/v1/tools/{{toolId}}
    body:
      code: "def test_add_v1(a: int, b: int) -> int:\n    \"\"\"Add two integers (v2: with type coercion).\n\n    Args:\n        a: First integer\n        b: Second integer\n\n    Returns:\n        Sum of a and b\n    \"\"\"\n    return int(a) + int(b)\n"
    expect:
      status: 200

  - name: "版本列表（应有 v1 + v2）"
    method: GET
    path: /api/v1/tools/{{toolId}}/versions
    expect:
      status: 200

  - name: "获取 v1 版本详情"
    method: GET
    path: /api/v1/tools/{{toolId}}/versions/1
    expect:
      status: 200

  - name: "再次更新代码 → 触发保存 v3"
    method: PATCH
    path: /api/v1/tools/{{toolId}}
    body:
      code: "def test_add_v1(a, b):\n    \"\"\"Add two numbers (v3: any type).\n\n    Args:\n        a: First number\n        b: Second number\n\n    Returns:\n        Sum\n    \"\"\"\n    return a + b\n"
    expect:
      status: 200

  - name: "版本列表（应有 v1/v2/v3）"
    method: GET
    path: /api/v1/tools/{{toolId}}/versions
    expect:
      status: 200

  - name: "回滚到 v1"
    method: POST
    path: /api/v1/tools/{{toolId}}:revert
    body:
      version: 1
    expect:
      status: 200

  - name: "执行回滚后的工具（100+200）"
    method: POST
    path: /api/v1/tools/{{toolId}}:run
    body:
      input:
        a: 100
        b: 200
    expect:
      status: 200

  - name: "获取不存在的版本 → 404"
    method: GET
    path: /api/v1/tools/{{toolId}}/versions/999
    expect:
      status: 404

  - name: "回滚到不存在的版本 → 404"
    method: POST
    path: /api/v1/tools/{{toolId}}:revert
    body:
      version: 999
    expect:
      status: 404

  - name: "导出工具"
    method: POST
    path: /api/v1/tools/{{toolId}}:export
    expect:
      status: 200

  - name: "删除工具"
    method: DELETE
    path: /api/v1/tools/{{toolId}}
    expect:
      status: 204

  - name: "访问已删除工具 → 404"
    method: GET
    path: /api/v1/tools/{{toolId}}
    expect:
      status: 404

  - name: "运行已删除工具 → 404"
    method: POST
    path: /api/v1/tools/{{toolId}}:run
    body:
      input:
        a: 1
        b: 2
    expect:
      status: 404

  - name: "再次删除已删除工具 → 404"
    method: DELETE
    path: /api/v1/tools/{{toolId}}
    expect:
      status: 404
