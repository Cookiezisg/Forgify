name: "09 分页 & Cursor 边缘情况"
description: "limit 边界 / cursor 链式 / 多资源分页 / 空集合分页"
steps:
  # ── 空集合分页 ────────────────────────────────────────────────────────────

  - name: "工具列表 limit=1（可能空）"
    method: GET
    path: /api/v1/tools?limit=1
    expect:
      status: 200

  - name: "工具列表 limit=200（超大 limit）"
    method: GET
    path: /api/v1/tools?limit=200
    expect:
      status: 200

  # ── 创建多条对话供分页测试 ────────────────────────────────────────────────

  - name: "创建对话 P1"
    method: POST
    path: /api/v1/conversations
    body:
      title: "pagination-P1"
    expect:
      status: 201
    capture:
      pId1: "$.data.id"

  - name: "创建对话 P2"
    method: POST
    path: /api/v1/conversations
    body:
      title: "pagination-P2"
    expect:
      status: 201
    capture:
      pId2: "$.data.id"

  - name: "创建对话 P3"
    method: POST
    path: /api/v1/conversations
    body:
      title: "pagination-P3"
    expect:
      status: 201
    capture:
      pId3: "$.data.id"

  - name: "创建对话 P4"
    method: POST
    path: /api/v1/conversations
    body:
      title: "pagination-P4"
    expect:
      status: 201
    capture:
      pId4: "$.data.id"

  - name: "创建对话 P5"
    method: POST
    path: /api/v1/conversations
    body:
      title: "pagination-P5"
    expect:
      status: 201
    capture:
      pId5: "$.data.id"

  - name: "列出对话 limit=2（hasMore=true 预期）"
    method: GET
    path: /api/v1/conversations?limit=2
    expect:
      status: 200

  - name: "列出对话 limit=3"
    method: GET
    path: /api/v1/conversations?limit=3
    expect:
      status: 200

  - name: "列出对话 limit=100"
    method: GET
    path: /api/v1/conversations?limit=100
    expect:
      status: 200

  - name: "列出对话 limit=1"
    method: GET
    path: /api/v1/conversations?limit=1
    expect:
      status: 200

  # ── 消息列表分页 ──────────────────────────────────────────────────────────

  - name: "对话 P1 消息列表（空）"
    method: GET
    path: /api/v1/conversations/{{pId1}}/messages
    expect:
      status: 200

  - name: "对话 P1 消息 limit=1"
    method: GET
    path: /api/v1/conversations/{{pId1}}/messages?limit=1
    expect:
      status: 200

  - name: "对话 P1 消息 limit=200（上限）"
    method: GET
    path: /api/v1/conversations/{{pId1}}/messages?limit=200
    expect:
      status: 200

  # ── 工具分页 ──────────────────────────────────────────────────────────────

  - name: "创建工具 PG1"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_pg_tool_1"
      description: "pagination tool 1"
      code: "def test_pg_tool_1() -> int: return 1\n"
    expect:
      status: 201
    capture:
      pgTool1: "$.data.id"

  - name: "创建工具 PG2"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_pg_tool_2"
      description: "pagination tool 2"
      code: "def test_pg_tool_2() -> int: return 2\n"
    expect:
      status: 201
    capture:
      pgTool2: "$.data.id"

  - name: "创建工具 PG3"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_pg_tool_3"
      description: "pagination tool 3"
      code: "def test_pg_tool_3() -> int: return 3\n"
    expect:
      status: 201
    capture:
      pgTool3: "$.data.id"

  - name: "工具列表 limit=1"
    method: GET
    path: /api/v1/tools?limit=1
    expect:
      status: 200

  - name: "工具列表 limit=2"
    method: GET
    path: /api/v1/tools?limit=2
    expect:
      status: 200

  - name: "工具列表 limit=50（全部）"
    method: GET
    path: /api/v1/tools?limit=50
    expect:
      status: 200

  - name: "工具版本列表分页（工具 PG1）"
    method: GET
    path: /api/v1/tools/{{pgTool1}}/versions
    expect:
      status: 200

  - name: "工具运行历史 limit=1"
    method: GET
    path: /api/v1/tools/{{pgTool1}}/run-history?limit=1
    expect:
      status: 200

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "删除工具 PG1"
    method: DELETE
    path: /api/v1/tools/{{pgTool1}}
    expect:
      status: 204

  - name: "删除工具 PG2"
    method: DELETE
    path: /api/v1/tools/{{pgTool2}}
    expect:
      status: 204

  - name: "删除工具 PG3"
    method: DELETE
    path: /api/v1/tools/{{pgTool3}}
    expect:
      status: 204

  - name: "删除对话 P1"
    method: DELETE
    path: /api/v1/conversations/{{pId1}}
    expect:
      status: 204

  - name: "删除对话 P2"
    method: DELETE
    path: /api/v1/conversations/{{pId2}}
    expect:
      status: 204

  - name: "删除对话 P3"
    method: DELETE
    path: /api/v1/conversations/{{pId3}}
    expect:
      status: 204

  - name: "删除对话 P4"
    method: DELETE
    path: /api/v1/conversations/{{pId4}}
    expect:
      status: 204

  - name: "删除对话 P5"
    method: DELETE
    path: /api/v1/conversations/{{pId5}}
    expect:
      status: 204
