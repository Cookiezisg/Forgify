name: "01 Infra 基础设施配置"
description: "API Key 多 provider / Model Config 覆盖 / 幂等性验证"
steps:
  - name: "健康检查"
    method: GET
    path: /api/v1/health
    expect:
      status: 200

  - name: "创建 DeepSeek API Key"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "deepseek"
      key: "{{env.DEEPSEEK_API_KEY}}"
      displayName: "infra-test-ds"
    expect:
      status: 201
    capture:
      dsKeyId: "$.data.id"

  - name: "创建 OpenAI API Key（不同 provider 共存）"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "openai"
      key: "sk-fake-oai-key-for-testing"
      displayName: "infra-test-oai"
    expect:
      status: 201
    capture:
      oaiKeyId: "$.data.id"

  - name: "创建 Anthropic API Key"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "anthropic"
      key: "sk-ant-api03-fake"
      displayName: "infra-test-ant"
    expect:
      status: 201
    capture:
      antKeyId: "$.data.id"

  - name: "列出所有 Key（至少 3 个）"
    method: GET
    path: /api/v1/api-keys
    expect:
      status: 200

  - name: "按 provider 过滤（deepseek）"
    method: GET
    path: /api/v1/api-keys?provider=deepseek
    expect:
      status: 200

  - name: "更新 displayName"
    method: PATCH
    path: /api/v1/api-keys/{{dsKeyId}}
    body:
      displayName: "renamed-deepseek"
    expect:
      status: 200

  - name: "设置 Chat 模型 → deepseek-chat"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "deepseek"
      modelId: "deepseek-chat"
    expect:
      status: 200

  - name: "查询模型配置（返回 chat scenario）"
    method: GET
    path: /api/v1/model-configs
    expect:
      status: 200

  - name: "覆盖 Chat 模型（幂等，相同值）"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "deepseek"
      modelId: "deepseek-chat"
    expect:
      status: 200

  - name: "覆盖 Chat 模型（切换到 openai）"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "openai"
      modelId: "gpt-4o-mini"
    expect:
      status: 200

  - name: "恢复回 deepseek"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "deepseek"
      modelId: "deepseek-chat"
    expect:
      status: 200

  # ── 错误验证 ──────────────────────────────────────────────────────────────

  - name: "无效 provider → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "totally_fake_xyz"
      key: "sk-fake"
    expect:
      status: 400

  - name: "ollama 不填 baseUrl → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "ollama"
      key: "not-needed"
    expect:
      status: 400

  - name: "custom 不填 apiFormat → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "custom"
      key: "sk-custom"
      baseUrl: "http://localhost:9000"
    expect:
      status: 400

  - name: "无效 scenario → 400"
    method: PUT
    path: /api/v1/model-configs/nonexistent_scenario
    body:
      provider: "deepseek"
      modelId: "deepseek-chat"
    expect:
      status: 400

  - name: "更新不存在的 Key → 404"
    method: PATCH
    path: /api/v1/api-keys/aki_nonexistent_0000
    body:
      displayName: "ghost"
    expect:
      status: 404

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "删除 OpenAI Key"
    method: DELETE
    path: /api/v1/api-keys/{{oaiKeyId}}
    expect:
      status: 204

  - name: "再次删除同一 Key（404）"
    method: DELETE
    path: /api/v1/api-keys/{{oaiKeyId}}
    expect:
      status: 404

  - name: "删除 Anthropic Key"
    method: DELETE
    path: /api/v1/api-keys/{{antKeyId}}
    expect:
      status: 204

  - name: "保留 DeepSeek Key（供后续测试使用）"
    method: GET
    path: /api/v1/api-keys
    expect:
      status: 200
