name: "03 Chat 消息收发"
description: "202 确认 / 消息列表 / 分页 / 队列满 / 流取消 / 附件引用格式"
steps:
  - name: "创建测试对话"
    method: POST
    path: /api/v1/conversations
    body:
      title: "chat-msg-test"
    expect:
      status: 201
    capture:
      convId: "$.data.id"

  - name: "消息列表（初始为空）"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages
    expect:
      status: 200

  - name: "消息列表 limit=1（空对话）"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages?limit=1
    expect:
      status: 200

  - name: "消息列表 limit=200（超大 limit）"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages?limit=200
    expect:
      status: 200

  - name: "发送第一条消息"
    method: POST
    path: /api/v1/conversations/{{convId}}/messages
    body:
      content: "Reply with exactly one word: OK"
    expect:
      status: 202
    capture:
      msgId1: "$.data.messageId"

  - name: "消息列表（至少有 user 消息）"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages
    expect:
      status: 200

  - name: "消息列表 limit=1"
    method: GET
    path: /api/v1/conversations/{{convId}}/messages?limit=1
    expect:
      status: 200

  - name: "取消流（无流时 → 404）"
    method: DELETE
    path: /api/v1/conversations/{{convId}}/stream
    expect:
      status: 404

  - name: "发送含空 attachmentIds 的消息"
    method: POST
    path: /api/v1/conversations/{{convId}}/messages
    body:
      content: "second message with empty attachments"
      attachmentIds: []
    expect:
      status: 202

  - name: "发送只有 content 无 attachmentIds 字段的消息"
    method: POST
    path: /api/v1/conversations/{{convId}}/messages
    body:
      content: "no attachmentIds field at all"
    expect:
      status: 202

  # ── 第二个对话测试队列 ────────────────────────────────────────────────────

  - name: "创建第二个对话"
    method: POST
    path: /api/v1/conversations
    body:
      title: "chat-queue-test"
    expect:
      status: 201
    capture:
      convId2: "$.data.id"

  - name: "对话 2：发消息 1（启动 Agent）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "Reply with one word: ONE"
    expect:
      status: 202

  - name: "对话 2：发消息 2（排队）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "Reply with one word: TWO"
    expect:
      status: 202

  - name: "对话 2：发消息 3（排队）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "Reply with one word: THREE"
    expect:
      status: 202

  - name: "对话 2：发消息 4（排队）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "Reply with one word: FOUR"
    expect:
      status: 202

  - name: "对话 2：发消息 5（排队）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "Reply with one word: FIVE"
    expect:
      status: 202

  - name: "对话 2：发消息 6（队列满 → 409）"
    method: POST
    path: /api/v1/conversations/{{convId2}}/messages
    body:
      content: "should be rejected, queue is full"
    expect:
      status: 409

  - name: "取消对话 2 的流"
    method: DELETE
    path: /api/v1/conversations/{{convId2}}/stream
    expect:
      status: 204

  # ── 错误情况 ──────────────────────────────────────────────────────────────

  - name: "对不存在的对话发消息 → 404"
    method: POST
    path: /api/v1/conversations/cv_nonexistent_0000/messages
    body:
      content: "should fail"
    expect:
      status: 404

  - name: "获取不存在对话的消息 → 404"
    method: GET
    path: /api/v1/conversations/cv_nonexistent_0000/messages
    expect:
      status: 404

  - name: "取消不存在对话的流 → 404"
    method: DELETE
    path: /api/v1/conversations/cv_nonexistent_0000/stream
    expect:
      status: 404

  - name: "SSE 缺少 conversationId 参数 → 400"
    method: GET
    path: /api/v1/events
    expect:
      status: 400

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "删除对话 1"
    method: DELETE
    path: /api/v1/conversations/{{convId}}
    expect:
      status: 204

  - name: "删除对话 2"
    method: DELETE
    path: /api/v1/conversations/{{convId2}}
    expect:
      status: 204
