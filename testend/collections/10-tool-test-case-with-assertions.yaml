name: "10 测试用例断言精确验证"
description: "字符串/数字/bool/嵌套对象/None 各类型断言 + pass/fail 分支验证"
steps:
  # ── 多返回类型工具 ────────────────────────────────────────────────────────

  - name: "创建：类型检测工具"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_type_info"
      description: "Return type name and value of input"
      code: "def test_type_info(value) -> dict:\n    \"\"\"Return type info of the input.\n\n    Args:\n        value: Any value\n\n    Returns:\n        dict with type_name and str_repr\n    \"\"\"\n    return {\n        'type_name': type(value).__name__,\n        'is_none': value is None,\n        'str_repr': str(value)\n    }\n"
      tags: ["type", "test"]
    expect:
      status: 201
    capture:
      typeToolId: "$.data.id"

  - name: "TC: 整数输入（42）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_int"
      inputData: "{\"value\": 42}"
      expectedOutput: "{\"type_name\": \"int\", \"is_none\": false, \"str_repr\": \"42\"}"
    expect:
      status: 201
    capture:
      tcTypeInt: "$.data.id"

  - name: "TC: 字符串输入"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_str"
      inputData: "{\"value\": \"hello\"}"
      expectedOutput: "{\"type_name\": \"str\", \"is_none\": false, \"str_repr\": \"hello\"}"
    expect:
      status: 201
    capture:
      tcTypeStr: "$.data.id"

  - name: "TC: 浮点输入"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_float"
      inputData: "{\"value\": 3.14}"
      expectedOutput: "{\"type_name\": \"float\", \"is_none\": false, \"str_repr\": \"3.14\"}"
    expect:
      status: 201
    capture:
      tcTypeFloat: "$.data.id"

  - name: "TC: 布尔值 true"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_bool_true"
      inputData: "{\"value\": true}"
      expectedOutput: "{\"type_name\": \"bool\", \"is_none\": false, \"str_repr\": \"True\"}"
    expect:
      status: 201
    capture:
      tcTypeBool: "$.data.id"

  - name: "TC: 列表输入"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_list"
      inputData: "{\"value\": [1, 2, 3]}"
      expectedOutput: "{\"type_name\": \"list\", \"is_none\": false, \"str_repr\": \"[1, 2, 3]\"}"
    expect:
      status: 201
    capture:
      tcTypeList: "$.data.id"

  - name: "TC: 故意错误断言（应 fail）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases
    body:
      name: "type_intentional_fail"
      inputData: "{\"value\": 42}"
      expectedOutput: "{\"type_name\": \"str\"}"
    expect:
      status: 201
    capture:
      tcFail: "$.data.id"

  - name: "运行整数用例（应 pass）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases/{{tcTypeInt}}:run
    expect:
      status: 200

  - name: "运行字符串用例（应 pass）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases/{{tcTypeStr}}:run
    expect:
      status: 200

  - name: "运行故意失败用例（ok=true，pass=false）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}/test-cases/{{tcFail}}:run
    expect:
      status: 200

  - name: "运行全部（应 5 pass + 1 fail）"
    method: POST
    path: /api/v1/tools/{{typeToolId}}:test
    expect:
      status: 200

  # ── 纯字符串返回工具 ──────────────────────────────────────────────────────

  - name: "创建：字符串返回工具"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_greet"
      description: "Return a greeting string"
      code: "def test_greet(name: str) -> str:\n    \"\"\"Return a greeting.\n\n    Args:\n        name: Person's name\n\n    Returns:\n        Greeting string\n    \"\"\"\n    return f'Hello, {name}!'\n"
      tags: ["string"]
    expect:
      status: 201
    capture:
      greetId: "$.data.id"

  - name: "TC greet: 正常名字"
    method: POST
    path: /api/v1/tools/{{greetId}}/test-cases
    body:
      name: "greet_alice"
      inputData: "{\"name\": \"Alice\"}"
      expectedOutput: "\"Hello, Alice!\""
    expect:
      status: 201
    capture:
      tcGreet1: "$.data.id"

  - name: "TC greet: 空名字"
    method: POST
    path: /api/v1/tools/{{greetId}}/test-cases
    body:
      name: "greet_empty"
      inputData: "{\"name\": \"\"}"
      expectedOutput: "\"Hello, !\""
    expect:
      status: 201
    capture:
      tcGreet2: "$.data.id"

  - name: "TC greet: Unicode 名字"
    method: POST
    path: /api/v1/tools/{{greetId}}/test-cases
    body:
      name: "greet_chinese"
      inputData: "{\"name\": \"张三\"}"
      expectedOutput: "\"Hello, 张三!\""
    expect:
      status: 201
    capture:
      tcGreet3: "$.data.id"

  - name: "运行全部 greet 用例"
    method: POST
    path: /api/v1/tools/{{greetId}}:test
    expect:
      status: 200

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "清理：删除 type_info 工具"
    method: DELETE
    path: /api/v1/tools/{{typeToolId}}
    expect:
      status: 204

  - name: "清理：删除 greet 工具"
    method: DELETE
    path: /api/v1/tools/{{greetId}}
    expect:
      status: 204
