name: "11 Full E2E：对话 × 工具完整链路"
description: "配置 → 创建工具 → 对话发消息 → 消息列表 → 工具历史 → 清理，模拟真实用户流程"
steps:
  # ── 确认基础设施就绪 ──────────────────────────────────────────────────────

  - name: "健康检查"
    method: GET
    path: /api/v1/health
    expect:
      status: 200

  - name: "确认 API Key 存在（list）"
    method: GET
    path: /api/v1/api-keys
    expect:
      status: 200

  - name: "确认模型配置存在"
    method: GET
    path: /api/v1/model-configs
    expect:
      status: 200

  # ── 创建工具库 ────────────────────────────────────────────────────────────

  - name: "创建工具：温度转换"
    method: POST
    path: /api/v1/tools
    body:
      name: "e2e_temp_convert"
      description: "Convert temperature between Celsius and Fahrenheit"
      code: "def e2e_temp_convert(value: float, from_unit: str) -> dict:\n    \"\"\"Convert temperature between Celsius and Fahrenheit.\n\n    Args:\n        value: Temperature value\n        from_unit: 'C' for Celsius, 'F' for Fahrenheit\n\n    Returns:\n        dict with converted value and unit\n    \"\"\"\n    from_unit = from_unit.upper()\n    if from_unit == 'C':\n        result = value * 9/5 + 32\n        to_unit = 'F'\n    elif from_unit == 'F':\n        result = (value - 32) * 5/9\n        to_unit = 'C'\n    else:\n        return {'error': f'Unknown unit: {from_unit}', 'result': None, 'to_unit': None}\n    return {'result': round(result, 2), 'to_unit': to_unit, 'error': None}\n"
      tags: ["convert", "e2e"]
    expect:
      status: 201
    capture:
      e2eToolId: "$.data.id"

  - name: "为工具添加测试用例：100C = 212F"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}/test-cases
    body:
      name: "boiling_point"
      inputData: "{\"value\": 100, \"from_unit\": \"C\"}"
      expectedOutput: "{\"result\": 212.0, \"to_unit\": \"F\", \"error\": null}"
    expect:
      status: 201
    capture:
      e2eTc1: "$.data.id"

  - name: "为工具添加测试用例：0C = 32F"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}/test-cases
    body:
      name: "freezing_point"
      inputData: "{\"value\": 0, \"from_unit\": \"C\"}"
      expectedOutput: "{\"result\": 32.0, \"to_unit\": \"F\", \"error\": null}"
    expect:
      status: 201
    capture:
      e2eTc2: "$.data.id"

  - name: "运行工具测试（2条）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:test
    expect:
      status: 200

  - name: "执行工具（37°C 体温）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:run
    body:
      input:
        value: 37
        from_unit: "C"
    expect:
      status: 200

  - name: "执行工具（98.6°F → 37°C）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:run
    body:
      input:
        value: 98.6
        from_unit: "F"
    expect:
      status: 200

  - name: "执行工具（无效单位）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:run
    body:
      input:
        value: 100
        from_unit: "K"
    expect:
      status: 200

  # ── 对话流程 ──────────────────────────────────────────────────────────────

  - name: "创建工作对话"
    method: POST
    path: /api/v1/conversations
    body:
      title: "E2E Test Conversation"
    expect:
      status: 201
    capture:
      e2eConvId: "$.data.id"

  - name: "查询对话消息（初始为空）"
    method: GET
    path: /api/v1/conversations/{{e2eConvId}}/messages
    expect:
      status: 200

  - name: "发送消息 1（触发 Agent）"
    method: POST
    path: /api/v1/conversations/{{e2eConvId}}/messages
    body:
      content: "What is today's date and time? Use the datetime tool."
    expect:
      status: 202

  - name: "查询消息（应有 user 消息）"
    method: GET
    path: /api/v1/conversations/{{e2eConvId}}/messages
    expect:
      status: 200

  - name: "发送消息 2"
    method: POST
    path: /api/v1/conversations/{{e2eConvId}}/messages
    body:
      content: "Remember that I prefer Celsius. Reply just: GOT IT"
    expect:
      status: 202

  - name: "查询消息列表"
    method: GET
    path: /api/v1/conversations/{{e2eConvId}}/messages
    expect:
      status: 200

  # ── 工具版本创建 ──────────────────────────────────────────────────────────

  - name: "更新工具代码（v2：增加 Kelvin 支持）"
    method: PATCH
    path: /api/v1/tools/{{e2eToolId}}
    body:
      code: "def e2e_temp_convert(value: float, from_unit: str) -> dict:\n    \"\"\"Convert temperature (v2: supports Kelvin).\n\n    Args:\n        value: Temperature value\n        from_unit: 'C', 'F', or 'K'\n\n    Returns:\n        dict with converted values in all units\n    \"\"\"\n    from_unit = from_unit.upper()\n    if from_unit == 'C':\n        c = value\n    elif from_unit == 'F':\n        c = (value - 32) * 5/9\n    elif from_unit == 'K':\n        c = value - 273.15\n    else:\n        return {'error': f'Unknown unit: {from_unit}'}\n    return {\n        'celsius': round(c, 2),\n        'fahrenheit': round(c * 9/5 + 32, 2),\n        'kelvin': round(c + 273.15, 2),\n        'error': None\n    }\n"
    expect:
      status: 200

  - name: "执行 v2（0°C = 273.15K）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:run
    body:
      input:
        value: 0
        from_unit: "C"
    expect:
      status: 200

  - name: "列出版本"
    method: GET
    path: /api/v1/tools/{{e2eToolId}}/versions
    expect:
      status: 200

  - name: "查看工具运行历史"
    method: GET
    path: /api/v1/tools/{{e2eToolId}}/run-history
    expect:
      status: 200

  - name: "查看测试历史"
    method: GET
    path: /api/v1/tools/{{e2eToolId}}/test-history
    expect:
      status: 200

  # ── 导出备份 ──────────────────────────────────────────────────────────────

  - name: "导出工具（备份）"
    method: POST
    path: /api/v1/tools/{{e2eToolId}}:export
    expect:
      status: 200

  # ── 清理 ──────────────────────────────────────────────────────────────────

  - name: "删除对话"
    method: DELETE
    path: /api/v1/conversations/{{e2eConvId}}
    expect:
      status: 204

  - name: "删除工具"
    method: DELETE
    path: /api/v1/tools/{{e2eToolId}}
    expect:
      status: 204
