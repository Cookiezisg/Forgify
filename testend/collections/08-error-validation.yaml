name: "08 错误处理 & 边缘情况"
description: "全端点的 404/409/400/422/413 错误码验证，不依赖 LLM"
steps:
  # ── Tool 404 ──────────────────────────────────────────────────────────────

  - name: "GET 不存在的工具 → 404"
    method: GET
    path: /api/v1/tools/t_nonexistent_00000000
    expect:
      status: 404

  - name: "PATCH 不存在的工具 → 404"
    method: PATCH
    path: /api/v1/tools/t_nonexistent_00000000
    body:
      description: "ghost"
    expect:
      status: 404

  - name: "DELETE 不存在的工具 → 404"
    method: DELETE
    path: /api/v1/tools/t_nonexistent_00000000
    expect:
      status: 404

  - name: "运行不存在的工具 → 404"
    method: POST
    path: /api/v1/tools/t_nonexistent_00000000:run
    body:
      input: {}
    expect:
      status: 404

  - name: "导出不存在的工具 → 404"
    method: POST
    path: /api/v1/tools/t_nonexistent_00000000:export
    expect:
      status: 404

  - name: "回滚不存在的工具 → 404"
    method: POST
    path: /api/v1/tools/t_nonexistent_00000000:revert
    body:
      version: 1
    expect:
      status: 404

  - name: "运行全部测试（不存在的工具）→ 404"
    method: POST
    path: /api/v1/tools/t_nonexistent_00000000:test
    expect:
      status: 404

  - name: "列出版本（不存在的工具）→ 404"
    method: GET
    path: /api/v1/tools/t_nonexistent_00000000/versions
    expect:
      status: 404

  - name: "获取 pending（不存在的工具）→ 404"
    method: GET
    path: /api/v1/tools/t_nonexistent_00000000/pending
    expect:
      status: 404

  - name: "列出测试用例（不存在工具）→ 404"
    method: GET
    path: /api/v1/tools/t_nonexistent_00000000/test-cases
    expect:
      status: 404

  - name: "创建测试用例（不存在工具）→ 404"
    method: POST
    path: /api/v1/tools/t_nonexistent_00000000/test-cases
    body:
      name: "ghost"
      inputData: "{}"
    expect:
      status: 404

  # ── Tool 409（重名冲突）────────────────────────────────────────────────────

  - name: "创建工具（for 重名测试）"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_dup_collision_tool"
      description: "First"
      code: "def test_dup_collision_tool(): return 1\n"
    expect:
      status: 201
    capture:
      dupId: "$.data.id"

  - name: "再次创建同名工具 → 409"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_dup_collision_tool"
      description: "Second duplicate"
      code: "def test_dup_collision_tool(): return 2\n"
    expect:
      status: 409

  - name: "清理重名冲突工具"
    method: DELETE
    path: /api/v1/tools/{{dupId}}
    expect:
      status: 204

  # ── Conversation 404 ──────────────────────────────────────────────────────

  - name: "获取不存在对话的消息 → 404"
    method: GET
    path: /api/v1/conversations/cv_nonexistent_0000/messages
    expect:
      status: 404

  - name: "对不存在的对话发消息 → 404"
    method: POST
    path: /api/v1/conversations/cv_nonexistent_0000/messages
    body:
      content: "should fail"
    expect:
      status: 404

  - name: "取消不存在对话的流 → 404"
    method: DELETE
    path: /api/v1/conversations/cv_nonexistent_0000/stream
    expect:
      status: 404

  - name: "改名不存在的对话 → 404"
    method: PATCH
    path: /api/v1/conversations/cv_nonexistent_0000
    body:
      title: "ghost"
    expect:
      status: 404

  - name: "删除不存在的对话 → 404"
    method: DELETE
    path: /api/v1/conversations/cv_nonexistent_0000
    expect:
      status: 404

  # ── API Key 错误 ───────────────────────────────────────────────────────────

  - name: "无效 provider → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "fake_xyz_123"
      key: "sk-fake"
    expect:
      status: 400

  - name: "ollama 缺少 baseUrl → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "ollama"
      key: "not-needed"
    expect:
      status: 400

  - name: "custom 缺少 apiFormat → 400"
    method: POST
    path: /api/v1/api-keys
    body:
      provider: "custom"
      key: "sk-custom"
      baseUrl: "http://localhost:9000"
    expect:
      status: 400

  - name: "更新不存在的 API Key → 404"
    method: PATCH
    path: /api/v1/api-keys/aki_nonexistent_00000
    body:
      displayName: "ghost"
    expect:
      status: 404

  - name: "删除不存在的 API Key → 404"
    method: DELETE
    path: /api/v1/api-keys/aki_nonexistent_00000
    expect:
      status: 404

  # ── Model Config 错误 ─────────────────────────────────────────────────────

  - name: "无效 scenario → 400"
    method: PUT
    path: /api/v1/model-configs/bad_scenario_xyz
    body:
      provider: "deepseek"
      modelId: "deepseek-chat"
    expect:
      status: 400

  - name: "provider 为空 → 400"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: ""
      modelId: "deepseek-chat"
    expect:
      status: 400

  - name: "modelId 为空 → 400"
    method: PUT
    path: /api/v1/model-configs/chat
    body:
      provider: "deepseek"
      modelId: ""
    expect:
      status: 400

  # ── SSE 错误 ──────────────────────────────────────────────────────────────

  - name: "SSE 缺少 conversationId → 400"
    method: GET
    path: /api/v1/events
    expect:
      status: 400
