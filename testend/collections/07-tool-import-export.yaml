name: "07 Tool Import/Export 往返"
description: "创建 → 添加测试用例 → 导出 → 删除 → 导入 → 验证可执行 → 同名冲突"
steps:
  - name: "创建原始工具（字符串反转）"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_str_reverse"
      description: "Reverse a string"
      code: "def test_str_reverse(s: str) -> str:\n    \"\"\"Reverse the input string.\n\n    Args:\n        s: String to reverse\n\n    Returns:\n        Reversed string\n    \"\"\"\n    return s[::-1]\n"
      tags: ["string", "export-test"]
    expect:
      status: 201
    capture:
      origId: "$.data.id"

  - name: "添加测试用例 1"
    method: POST
    path: /api/v1/tools/{{origId}}/test-cases
    body:
      name: "reverse_hello"
      inputData: "{\"s\": \"hello\"}"
      expectedOutput: "\"olleh\""
    expect:
      status: 201

  - name: "添加测试用例 2（空字符串）"
    method: POST
    path: /api/v1/tools/{{origId}}/test-cases
    body:
      name: "reverse_empty"
      inputData: "{\"s\": \"\"}"
      expectedOutput: "\"\""
    expect:
      status: 201

  - name: "执行工具（验证可用）"
    method: POST
    path: /api/v1/tools/{{origId}}:run
    body:
      input:
        s: "Forgify"
    expect:
      status: 200

  - name: "运行全部测试（导出前验证）"
    method: POST
    path: /api/v1/tools/{{origId}}:test
    expect:
      status: 200

  - name: "导出工具"
    method: POST
    path: /api/v1/tools/{{origId}}:export
    expect:
      status: 200

  - name: "删除原始工具"
    method: DELETE
    path: /api/v1/tools/{{origId}}
    expect:
      status: 204

  - name: "验证原始工具已不存在"
    method: GET
    path: /api/v1/tools/{{origId}}
    expect:
      status: 404

  - name: "导入工具（完整 JSON）"
    method: POST
    path: /api/v1/tools:import
    body:
      name: "test_str_reverse"
      description: "Reverse a string"
      code: "def test_str_reverse(s: str) -> str:\n    \"\"\"Reverse the input string.\n\n    Args:\n        s: String to reverse\n\n    Returns:\n        Reversed string\n    \"\"\"\n    return s[::-1]\n"
      tags: ["string", "export-test"]
      testCases:
        - name: "reverse_hello"
          inputData: "{\"s\": \"hello\"}"
          expectedOutput: "\"olleh\""
        - name: "reverse_empty"
          inputData: "{\"s\": \"\"}"
          expectedOutput: "\"\""
    expect:
      status: 201
    capture:
      importedId: "$.data.id"

  - name: "执行导入后的工具（验证代码完整）"
    method: POST
    path: /api/v1/tools/{{importedId}}:run
    body:
      input:
        s: "world"
    expect:
      status: 200

  - name: "执行导入工具（palindrome: racecar）"
    method: POST
    path: /api/v1/tools/{{importedId}}:run
    body:
      input:
        s: "racecar"
    expect:
      status: 200

  - name: "导入工具的测试用例列表"
    method: GET
    path: /api/v1/tools/{{importedId}}/test-cases
    expect:
      status: 200

  - name: "运行全部测试（导入后验证）"
    method: POST
    path: /api/v1/tools/{{importedId}}:test
    expect:
      status: 200

  - name: "尝试导入同名工具 → 409"
    method: POST
    path: /api/v1/tools:import
    body:
      name: "test_str_reverse"
      description: "Duplicate import attempt"
      code: "def test_str_reverse(s: str) -> str: return s\n"
    expect:
      status: 409

  - name: "导入格式非法（缺 name 字段）"
    method: POST
    path: /api/v1/tools:import
    body:
      description: "Missing name"
      code: "def foo(): pass\n"
    expect:
      status: 400

  - name: "清理：删除导入的工具"
    method: DELETE
    path: /api/v1/tools/{{importedId}}
    expect:
      status: 204
