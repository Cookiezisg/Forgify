name: "05 Tool 测试用例管理"
description: "创建用例 → 运行单个 → 运行全部 → 查看历史 → 删除用例 → 无断言用例"
steps:
  - name: "创建被测工具（Fibonacci）"
    method: POST
    path: /api/v1/tools
    body:
      name: "test_fibonacci"
      description: "Return the nth Fibonacci number (0-indexed)"
      code: "def test_fibonacci(n: int) -> int:\n    \"\"\"Return the nth Fibonacci number.\n\n    Args:\n        n: Index (0-indexed, must be >= 0)\n\n    Returns:\n        nth Fibonacci number\n    \"\"\"\n    if n <= 0:\n        return 0\n    if n == 1:\n        return 1\n    a, b = 0, 1\n    for _ in range(2, n + 1):\n        a, b = b, a + b\n    return b\n"
      tags: ["math", "sequence"]
    expect:
      status: 201
    capture:
      toolId: "$.data.id"

  - name: "测试用例列表（初始为空）"
    method: GET
    path: /api/v1/tools/{{toolId}}/test-cases
    expect:
      status: 200

  - name: "创建用例：fib(0)=0"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_zero"
      inputData: "{\"n\": 0}"
      expectedOutput: "0"
    expect:
      status: 201
    capture:
      tc1Id: "$.data.id"

  - name: "创建用例：fib(1)=1"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_one"
      inputData: "{\"n\": 1}"
      expectedOutput: "1"
    expect:
      status: 201
    capture:
      tc2Id: "$.data.id"

  - name: "创建用例：fib(10)=55"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_ten"
      inputData: "{\"n\": 10}"
      expectedOutput: "55"
    expect:
      status: 201
    capture:
      tc3Id: "$.data.id"

  - name: "创建用例：fib(20)=6765（大数）"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_twenty"
      inputData: "{\"n\": 20}"
      expectedOutput: "6765"
    expect:
      status: 201
    capture:
      tc4Id: "$.data.id"

  - name: "创建用例：无断言（仅执行，不比对）"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_large_no_assert"
      inputData: "{\"n\": 50}"
      expectedOutput: ""
    expect:
      status: 201
    capture:
      tc5Id: "$.data.id"

  - name: "创建用例：边界 n=-1（负数）"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases
    body:
      name: "fib_negative"
      inputData: "{\"n\": -1}"
      expectedOutput: "0"
    expect:
      status: 201
    capture:
      tc6Id: "$.data.id"

  - name: "测试用例列表（应有 6 条）"
    method: GET
    path: /api/v1/tools/{{toolId}}/test-cases
    expect:
      status: 200

  - name: "运行单用例：fib(0)"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc1Id}}:run
    expect:
      status: 200

  - name: "运行单用例：fib(10)"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc3Id}}:run
    expect:
      status: 200

  - name: "运行单用例：fib(20)"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc4Id}}:run
    expect:
      status: 200

  - name: "运行单用例：无断言"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc5Id}}:run
    expect:
      status: 200

  - name: "运行单用例：负数边界"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc6Id}}:run
    expect:
      status: 200

  - name: "运行全部测试"
    method: POST
    path: /api/v1/tools/{{toolId}}:test
    expect:
      status: 200

  - name: "查看测试历史"
    method: GET
    path: /api/v1/tools/{{toolId}}/test-history
    expect:
      status: 200

  - name: "删除无断言用例"
    method: DELETE
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc5Id}}
    expect:
      status: 204

  - name: "再次删除同一用例 → 404"
    method: DELETE
    path: /api/v1/tools/{{toolId}}/test-cases/{{tc5Id}}
    expect:
      status: 404

  - name: "测试用例列表（现在应有 5 条）"
    method: GET
    path: /api/v1/tools/{{toolId}}/test-cases
    expect:
      status: 200

  - name: "再次运行全部（5 条）"
    method: POST
    path: /api/v1/tools/{{toolId}}:test
    expect:
      status: 200

  - name: "查看测试历史（有更多批次记录）"
    method: GET
    path: /api/v1/tools/{{toolId}}/test-history
    expect:
      status: 200

  - name: "运行不存在的测试用例 → 404"
    method: POST
    path: /api/v1/tools/{{toolId}}/test-cases/tc_nonexistent_00:run
    expect:
      status: 404

  - name: "清理：删除工具"
    method: DELETE
    path: /api/v1/tools/{{toolId}}
    expect:
      status: 204
